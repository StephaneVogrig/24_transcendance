services:

  gateway:
    build: ./backend/gateway
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend/gateway:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - authentification
      - blockchain
      - database
      - game
      - matchmaking
      - scores
      - tournament
      - websocket
    networks:
      - transcendence-network

  authentification:
    build: ./backend/authentification
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
      - AUTH0_CALLBACK_URL=${AUTH0_CALLBACK_URL}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - ./backend/authentification:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - transcendence-network
    env_file:
      - .env

  blockchain:
    build: ./backend/blockchain
    ports:
      - "3002:3002"
    networks:
      - transcendence-network
    env_file:
      - .env

  database:
    build: ./backend/database
    ports:
      - "3003:3003"
    networks:
      - transcendence-network

  game:
    build: ./backend/game
    ports:
      - "3004:3004"
    networks:
      - transcendence-network

  matchmaking:
    build: ./backend/matchmaking
    ports:
      - "3005:3005"
    networks:
      - transcendence-network

  scores:
    build: ./backend/scores
    ports:
      - "3006:3006"
    networks:
      - transcendence-network

  tournament:
    build: ./backend/tournament
    ports:
      - "3007:3007"
    networks:
      - transcendence-network

  websocket:
    build: ./backend/websocket
    ports:
      - "3008:3008"
    networks:
      - transcendence-network

  frontend:
    build: ./frontend
    ports:
      - "1800:80"
    depends_on:
      - gateway
    networks:
      - transcendence-network

networks:
  transcendence-network:
    driver: bridge
