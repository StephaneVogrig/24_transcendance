services:

    gateway:
        image: gateway
        container_name: gateway
        build:
            context: ./backend/gateway
            dockerfile: Dockerfile
        ports:
            - "3443:3443"
        environment:
            - NODE_ENV=development
            - HOST_IP=${HOST_IP}
        depends_on:
            - authentification
            - blockchain
            - database
            - game
            - matchmaking
            - scores
            - tournament
            - websocket
            - ai
        networks:
            - transcendence-network
        volumes:
            - ./ssl:/app/ssl

    authentification:
        image: authentification
        container_name: authentification
        build:
            context: ./backend/authentification
            dockerfile: Dockerfile
        ports:
            - "3001:3001"
        environment:
            - HOST_IP=${HOST_IP}
        networks:
            - transcendence-network
        volumes:
            - ./ssl:/app/ssl

    blockchain:
        image: blockchain
        container_name: blockchain
        build:
            context: ./backend/blockchain
            dockerfile: Dockerfile
        ports:
            - "3002:3002"
        networks:
            - transcendence-network
        environment:
            - HOST_IP=${HOST_IP}
        env_file:
            - .env
        volumes:
            - ./ssl:/app/ssl

    database:
        image: database
        container_name: database
        build:
            context: ./backend/database
            dockerfile: Dockerfile
        ports:
            - "3003:3003"
        environment:
            - HOST_IP=${HOST_IP}
        networks:
            - transcendence-network
        volumes:
            - ./ssl:/app/ssl

    game:
        image: game
        container_name: game
        build: ./backend/game
        ports:
            - "3004:3004"
        environment:
            - HOST_IP=${HOST_IP}
        networks:
            - transcendence-network
        volumes:
            - ./ssl:/app/ssl

    matchmaking:
        image: matchmaking
        container_name: matchmaking
        build:
            context: ./backend/matchmaking
            dockerfile: Dockerfile
        ports:
            - "3005:3005"
        environment:
            - HOST_IP=${HOST_IP}
        networks:
            - transcendence-network
        volumes:
            - ./ssl:/app/ssl

    scores:
        image: scores
        container_name: scores
        build:
            context: ./backend/scores
            dockerfile: Dockerfile
        ports:
            - "3006:3006"
        environment:
            - HOST_IP=${HOST_IP}
        networks:
            - transcendence-network
        volumes:
            - ./ssl:/app/ssl

    tournament:
        image: tournament
        container_name: tournament
        build:
            context: ./backend/tournament
            dockerfile: Dockerfile
        ports:
            - "3007:3007"
        environment:
            - HOST_IP=${HOST_IP}
        networks:
            - transcendence-network
        volumes:
            - ./ssl:/app/ssl

    websocket:
        image: websocket
        container_name: websocket
        build:
            context: ./backend/websocket
            dockerfile: Dockerfile
        ports:
            - "3008:3008"
        environment:
            - HOST_IP=${HOST_IP}
        networks:
            - transcendence-network
        volumes:
            - ./ssl:/app/ssl

    ai:
        image: ai
        container_name: ai
        build:
            context: ./backend/ai
            dockerfile: Dockerfile
        ports:
            - "3009:3009"
        environment:
            - HOST_IP=${HOST_IP}
        networks:
            - transcendence-network
        volumes:
            - ./ssl:/app/ssl

    frontend:
        image: frontend
        container_name: frontend
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - "5173:5173"
        environment:
            - HOST_IP=${HOST_IP}
        volumes:
            - ./frontend:/app
            - /app/node_modules
            - ./ssl:/app/ssl
        depends_on:
            - gateway
        networks:
            - transcendence-network

networks:
    transcendence-network:
        driver: bridge
